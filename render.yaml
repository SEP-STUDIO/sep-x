services:
  - type: web
    name: sep-x
    runtime: python
    plan: starter
    buildCommand: |
      pip install -r requirements.txt
    startCommand: gunicorn app:app --timeout 300 --workers 2 --threads 4
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: sep-x-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: sep-x-redis
          type: redis
          property: connectionString
    healthCheckPath: /health
    autoDeploy: true
