<!-- Simplified Dashboard - No sign-in UI -->
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEP X - API Gateway</title>
    <!-- Same styles as before -->
</head>
<body>
    <div class="app">
        <div class="glass">
            <!-- Header -->
            <header class="header">
                <div class="logo-area">
                    <div class="logo-icon">⚡</div>
                    <div class="logo-text">SEP X <span>· API Gateway</span></div>
                </div>
                <div class="header-actions">
                    <div class="status-pill" id="statusPill">
                        <span class="dot offline" id="statusDot"></span>
                        <span id="statusLabel">Waiting for tokens</span>
                    </div>
                    <button class="btn-outline" onclick="checkStatus()">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>
            </header>

            <!-- Main Content -->
            <div class="main-grid">
                <!-- Connection Status Card -->
                <div class="auth-card">
                    <h2>🔌 DeepSeek Connection</h2>
                    <div class="sub"><i class="fas fa-info-circle"></i> Tokens are synced via Chrome Extension</div>
                    
                    <div class="token-status-box">
                        <div>
                            <div class="label">Status</div>
                            <div class="value invalid" id="tokenStatus">Waiting for tokens</div>
                        </div>
                        <div>
                            <div class="label">Expires</div>
                            <div class="value" id="tokenExpiry" style="color:#6b7280;">—</div>
                        </div>
                        <div>
                            <div class="label">User</div>
                            <div class="value" id="tokenUser" style="color:#6b7280;font-size:13px;">default</div>
                        </div>
                    </div>
                    
                    <div class="quick-actions">
                        <button class="btn-outline" onclick="checkStatus()">
                            <i class="fas fa-sync-alt"></i> Refresh Status
                        </button>
                        <button class="btn-outline danger" onclick="clearTokens()">
                            <i class="fas fa-trash"></i> Clear Tokens
                        </button>
                    </div>
                    
                    <div id="statusMsg" class="msg"></div>
                </div>

                <!-- API Keys Management (Same as before) -->
                <div class="keys-card">
                    <!-- Same API key management UI -->
                </div>
            </div>

            <!-- Logs (Same as before) -->
            <div class="logs-section">
                <!-- Same logs UI -->
            </div>
        </div>
    </div>

    <script>
        const USER_ID = 'default';
        
        // Check token status from backend
        async function checkStatus() {
            try {
                const res = await fetch(`/api/token/status?user_id=${USER_ID}`);
                const data = await res.json();
                
                const statusEl = document.getElementById('tokenStatus');
                const expiryEl = document.getElementById('tokenExpiry');
                const dot = document.getElementById('statusDot');
                const label = document.getElementById('statusLabel');
                
                if (data.token_exists && data.is_valid) {
                    statusEl.textContent = '✅ Connected';
                    statusEl.className = 'value valid';
                    dot.className = 'dot online';
                    label.textContent = 'Connected';
                    
                    const days = data.expires_in_days || 0;
                    if (days > 2) {
                        expiryEl.textContent = Math.ceil(days) + ' days';
                        expiryEl.style.color = '#34d399';
                    } else if (days > 0) {
                        expiryEl.textContent = Math.ceil(days) + ' days ⚠️';
                        expiryEl.style.color = '#fbbf24';
                    } else {
                        expiryEl.textContent = 'EXPIRED';
                        expiryEl.style.color = '#f87171';
                    }
                } else {
                    statusEl.textContent = '❌ No token';
                    statusEl.className = 'value invalid';
                    dot.className = 'dot offline';
                    label.textContent = 'No token';
                    expiryEl.textContent = '—';
                    expiryEl.style.color = '#6b7280';
                }
            } catch (error) {
                console.error('Status check failed:', error);
            }
        }

        async function clearTokens() {
            if (!confirm('Clear all tokens? This will disconnect your API.')) return;
            try {
                const res = await fetch(`/api/tokens/clear?user_id=${USER_ID}`, { method: 'POST' });
                if (res.ok) {
                    checkStatus();
                    showStatus('Tokens cleared successfully', 'success');
                }
            } catch (error) {
                showStatus('Error: ' + error.message, 'error');
            }
        }

        function showStatus(message, type) {
            const el = document.getElementById('statusMsg');
            el.textContent = message;
            el.className = 'msg show ' + type;
            setTimeout(() => { el.className = 'msg'; }, 5000);
        }

        // Load status on page load
        document.addEventListener('DOMContentLoaded', () => {
            checkStatus();
            loadAPIKeys();
            loadLogs();
            
            // Auto-refresh
            setInterval(() => {
                if (document.visibilityState === 'visible') {
                    checkStatus();
                    loadAPIKeys();
                    loadLogs();
                }
            }, 30000);
        });

        // ... (rest of JavaScript functions from before: loadAPIKeys, loadLogs, createAPIKey, etc.)
    </script>
</body>
</html>
